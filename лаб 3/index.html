<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список покупок</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🛒 Список покупок</h1>
    
    <div class="input-section">
      <input type="text" id="itemInput" placeholder="Введите название товара...">
      <button id="addBtn">Добавить</button>
    </div>

    <div id="counter">Всего товаров: 0</div>

    <button id="clearAllBtn" class="clear-all-btn">Очистить весь список</button>

    <ul id="itemList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
