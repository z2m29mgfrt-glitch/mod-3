<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Менеджер заметок</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="page-body">

  <h1>Мои заметки</h1>
  <button id="theme-btn">🌙 Тёмная тема</button>
  <hr>

  <img id="profile-img"
       src="img/img1.jpg"
       alt="Фото 1"
       class="profile-photo">
  <br>
  <button id="change-img-btn">Сменить фото</button>
  <hr>

  <input type="text" id="note-input" placeholder="Введите заметку...">
  <button id="add-note-btn">Добавить заметку</button>
  <ul id="notes-list"></ul>

  <script src="script.js"></script>
</body>
</html>
